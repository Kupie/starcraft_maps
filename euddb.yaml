- name: Hotkeyed Unit
  address: '0x0057FE60'
  epd: -10561
  info: "Purpose\nTo detect the hotkey and then the slot that a unit is stored in\
    \ and/or the unit\nthat is stored in a slot within a hotkey for any player.\n\
    Math\nThe total amount of units that can be hotkeyed\nis 12.\nThere are 9 hotkeys\
    \ in existence.\n12 * 9 = 108\n108 is the total amount of EPD values for each\n\
    player.\nIf we want to check if there's a unit in the\nseventh slot within the\
    \ hotkey CTRL+0 for\nPlayer 1,\n-10561 + 7 = -10555.\nIf we want to check if there's\
    \ a unit in the\nfirst slot within the hotkey CTRL+1 for Player\n1,\n-10561 +\
    \ 12 = -10550.\nIf we want to check if there's a unit in\nthe first slot within\
    \ the hotkey CTRL+0 for\nPlayer 2,\n-10561 + 109 = -10452.\n12 * 9 * 8 = 864\n\
    864 is the total combined number of all players' EPD\nvalue.\nWe can check any\
    \ slots within any hotkeys for\nany player to detect if any unit exist.\nAt least\
    \ 1\nWe can check any slots within any hotkeys for\nany player to detect if no\
    \ unit exist.\nAt least 3749\nbut what if we want to detect if a specific unit\n\
    within the map is hotkeyed in a certain slot?\nUnit alpha ID (Unit Entity)\nIndex\
    \ #        Alpha ID\n0\t       2049\n1\t       3748 [+1700]\n2\t       3747 [-1]\n\
    3\t       3746 [-1]\nConfused? Hint: http://www.staredit.net/topic/14226/ (Read\
    \ Section 6)\n^^^^^^^Parts of this seem to be wrong.\nThis is the magic formula:\n\
    with the variables\np = player number (starting at 0 up to 7)\nh = hotkey number\n\
    i = index in a hotkey (starting at 0 up to 11)\nu = unit id\nthen if player p\
    \ has unit u hotkeyed in index i of hotkey h, we have, for u > 0\nmemory(-10561+(p*216)+(h*12)+i)\
    \ == 3749 - u,\nand for u = 0,\nmemory(-10561+(p*216)+(h*12)+i) == 2049.\n==============\n\
    Edited by PereC, 2021.06.25:\nEach u32 stores the Alpha ID of a hotkeyed unit:\n\
    Starting from 0x57FE60: All the hotkeyed unit of P1\n0x57FE60: Alpha ID of the\
    \ 1st unit in P1 hotkey 0\n0x57FE64: Alpha ID of the 2nd unit in P1 hotkey 0\n\
    0x57FE68: Alpha ID of the 3rd unit in P1 hotkey 0\n...\n0x57FE60 + 4 * 11: Alpha\
    \ ID of the 12th unit in P1 hotkey 0\n0x57FE60 + 4 * 12: Alpha ID of the 1st unit\
    \ in P1 hotkey 1\n0x57FE60 + 4 * 13: Alpha ID of the 2nd unit in P1 hotkey 1\n\
    ...\n0x57FE60 + 4 * 119: Alpha ID of the 12th unit in P1 hotkey 9\nFrom 0x57FE60\
    \ + 4 * 120 to 0x57FE60 + 4 * 216: ??????\n-----------\nStarting from 0x57FE60\
    \ + 216: All the hotkeyed unit of P2\n-----------\nStarting from 0x57FE60 + 216\
    \ * 2: All the hotkeyed unit of P3\n-----------\n...\n-----------\nStarting from\
    \ 0x57FE60 + 216 * 7: All the hotkeyed unit of P8\n-----------\nPersonally I don't\
    \ know why there are 864 bytes for each player. Intuitively there should be 4\
    \ * 12 * 10 = 480 bytes for each player, cuz there are 10 hotkeys and 12 units\
    \ within a hotkey."
  length: 8
  size: 864
  type: Simple Data

